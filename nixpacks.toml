# Configuracion de build para Railway - Laravel 12

# Extensiones PHP adicionales (GD requerida por intervention/image)
[phases.setup]
nixPkgs = ["php82Extensions.gd"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]
