# Configuracion de build para Railway - Laravel 12

[phases.setup]
nixPkgs = ["php82Extensions.gd", "python311", "python311Packages.pip"]

[phases.build]
cmds = [
    "pip install pandas scikit-learn scipy reportlab openpyxl",
    "composer install --no-dev --optimize-autoloader",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]